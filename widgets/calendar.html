<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Calendar Widget</title>

  <style>
    :root{
      --bg:#f5f7fb;
      --panel:#ffffff;
      --panel-2:#f0f4fa;
      --border:#dbe4f0;
      --text:#1f2937;
      --muted:#6b7280;
      --accent:#2563eb;
      --shadow:0 8px 24px rgba(31,41,55,.08);
      --radius:16px;
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      width:100%;
      height:100%;
      background:var(--bg);
      color:var(--text);
      font-family:Arial,Helvetica,sans-serif;
    }

    body{
      padding:16px;
    }

    .widget{
      width:100%;
      max-width:1400px;
      margin:0 auto;
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .toolbar{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
      justify-content:space-between;
      padding:14px 16px;
      border-bottom:1px solid var(--border);
      background:var(--panel);
    }

    .toolbar-left,
    .toolbar-right{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      align-items:center;
    }

    button, select{
      border:1px solid var(--border);
      background:var(--panel);
      color:var(--text);
      border-radius:10px;
      padding:10px 12px;
      font-size:14px;
      cursor:pointer;
    }

    button:hover, select:hover{
      background:var(--panel-2);
    }

    .title{
      font-size:20px;
      font-weight:700;
      margin-right:8px;
    }

    .subtitle{
      color:var(--muted);
      font-size:14px;
    }

    .view{
      padding:16px;
    }

    .legend{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      padding:0 16px 16px 16px;
    }

    .legend-item{
      display:flex;
      align-items:center;
      gap:8px;
      padding:8px 10px;
      border:1px solid var(--border);
      border-radius:999px;
      background:var(--panel-2);
      font-size:13px;
    }

    .dot{
      width:12px;
      height:12px;
      border-radius:999px;
      display:inline-block;
      flex:0 0 auto;
    }

    /* Month */
    .month-grid{
      display:grid;
      grid-template-columns:repeat(7,minmax(0,1fr));
      gap:10px;
    }

    .weekday{
      font-size:12px;
      font-weight:700;
      text-transform:uppercase;
      letter-spacing:.04em;
      color:var(--muted);
      padding:6px 8px;
      min-width:0;
    }

    .day{
      min-height:130px;
      border:1px solid var(--border);
      border-radius:14px;
      background:var(--panel);
      padding:10px;
      display:flex;
      flex-direction:column;
      gap:8px;
      min-width:0;
      overflow:hidden;
    }

    .day.other-month{
      background:#fafbfd;
      color:#9ca3af;
    }

    .day.today{
      border-color:var(--accent);
      box-shadow:0 0 0 2px rgba(37,99,235,.1);
    }

    .day-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      min-width:0;
    }

    .day-number{
      font-size:14px;
      font-weight:700;
      min-width:0;
    }

    .day-events{
      display:flex;
      flex-direction:column;
      gap:6px;
      min-height:0;
      min-width:0;
      overflow:hidden;
    }

    .event-chip{
      display:flex;
      align-items:flex-start;
      gap:8px;
      padding:7px 8px;
      border-radius:10px;
      background:#f8fafc;
      border:1px solid var(--border);
      font-size:12px;
      line-height:1.3;
      min-width:0;
      overflow:hidden;
    }

    .event-chip.compact{
      padding:5px 6px;
      min-height:26px;
    }

    .event-chip > div{
      min-width:0;
      flex:1;
    }

    .event-chip-title{
      font-weight:600;
      overflow:hidden;
      text-overflow:ellipsis;
      display:-webkit-box;
      -webkit-line-clamp:2;
      -webkit-box-orient:vertical;
      word-break:break-word;
    }

    .event-chip-meta{
      color:var(--muted);
      font-size:11px;
      margin-top:2px;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    .event-icon{
      flex:0 0 auto;
      font-size:14px;
      line-height:1;
      margin-top:1px;
    }

    .event-badge{
      width:10px;
      height:10px;
      border-radius:999px;
      flex:0 0 auto;
      margin-top:3px;
    }

    .more-count{
      font-size:12px;
      color:var(--muted);
      font-weight:600;
      padding-top:2px;
    }

    /* Week / agenda */
    .list-view{
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .list-day{
      border:1px solid var(--border);
      border-radius:14px;
      overflow:hidden;
      background:var(--panel);
    }

    .list-day-header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      padding:12px 14px;
      background:var(--panel-2);
      border-bottom:1px solid var(--border);
      min-width:0;
    }

    .list-day-title{
      font-weight:700;
      min-width:0;
    }

    .list-events{
      display:flex;
      flex-direction:column;
    }

    .list-event{
      display:flex;
      gap:12px;
      padding:14px;
      border-bottom:1px solid var(--border);
      align-items:flex-start;
      min-width:0;
    }

    .list-event:last-child{
      border-bottom:none;
    }

    .time-col{
      min-width:92px;
      font-size:13px;
      color:var(--muted);
      font-weight:600;
      flex:0 0 auto;
    }

    .event-main{
      min-width:0;
      flex:1;
    }

    .event-title{
      font-weight:700;
      margin-bottom:4px;
      overflow:hidden;
      text-overflow:ellipsis;
      display:-webkit-box;
      -webkit-line-clamp:2;
      -webkit-box-orient:vertical;
      word-break:break-word;
    }

    .event-sub{
      color:var(--muted);
      font-size:13px;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    /* Next up */
    .next-up{
      display:grid;
      gap:14px;
    }

    .hero{
      border:1px solid var(--border);
      border-radius:18px;
      background:linear-gradient(180deg,#ffffff,#f8fbff);
      padding:22px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .hero-label{
      font-size:12px;
      font-weight:700;
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:.04em;
    }

    .hero-title{
      font-size:28px;
      font-weight:800;
      line-height:1.1;
      word-break:break-word;
    }

    .hero-meta{
      color:var(--muted);
      font-size:15px;
      word-break:break-word;
    }

    .mini-list{
      display:grid;
      gap:10px;
    }

    /* Birthdays */
    .birthday-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
      gap:12px;
    }

    .birthday-card{
      border:1px solid var(--border);
      border-radius:16px;
      background:var(--panel);
      padding:16px;
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
    }

    .birthday-icon{
      width:40px;
      height:40px;
      border-radius:999px;
      display:grid;
      place-items:center;
      background:#f3f4f6;
      font-size:20px;
      flex:0 0 auto;
    }

    .birthday-name{
      font-weight:700;
      word-break:break-word;
    }

    .birthday-date{
      color:var(--muted);
      font-size:13px;
      margin-top:4px;
      word-break:break-word;
    }

    @media (max-width:900px){
      .month-grid{
        gap:6px;
      }

      .day{
        min-height:95px;
        padding:6px;
        gap:5px;
      }

      .weekday{
        font-size:11px;
        padding:4px 6px;
      }

      .day-number{
        font-size:13px;
      }

      .event-chip{
        padding:5px 6px;
        gap:6px;
        font-size:11px;
      }

      .event-chip-title{
        -webkit-line-clamp:1;
        font-size:11px;
      }

      .event-chip-meta{
        font-size:10px;
      }

      .time-col{
        min-width:68px;
        font-size:12px;
      }

      .event-title{
        font-size:13px;
        -webkit-line-clamp:2;
      }

      .event-sub{
        font-size:12px;
      }
    }

    @media (max-width:700px){
      body{
        padding:8px;
      }

      .toolbar{
        padding:10px;
      }

      .month-grid{
        gap:4px;
      }

      .day{
        min-height:78px;
        padding:5px;
        border-radius:10px;
      }

      .weekday{
        font-size:10px;
        padding:2px 4px;
      }

      .day-number{
        font-size:12px;
      }

      .event-chip{
        padding:4px 5px;
        border-radius:8px;
      }

      .event-chip-title{
        font-size:10px;
        -webkit-line-clamp:1;
      }

      .event-chip-meta{
        display:none;
      }

      .event-icon{
        font-size:12px;
      }

      .event-badge{
        width:8px;
        height:8px;
        margin-top:2px;
      }

      .more-count{
        font-size:10px;
      }

      .hero-title{
        font-size:22px;
      }

      .list-event{
        gap:8px;
        padding:10px;
      }

      .time-col{
        min-width:58px;
        font-size:11px;
      }

      .event-title{
        font-size:12px;
      }

      .event-sub{
        font-size:11px;
      }
    }
  </style>
</head>
<body>
  <div class="widget">
    <div class="toolbar">
      <div class="toolbar-left">
        <div>
          <div class="title">Calendar</div>
          <div class="subtitle" id="rangeLabel"></div>
        </div>
      </div>

      <div class="toolbar-right">
        <select id="layoutSelect">
          <option value="month">Month</option>
          <option value="week">Week</option>
          <option value="agenda">Agenda</option>
          <option value="birthdays">Birthdays</option>
          <option value="nextup">Next Up</option>
        </select>

        <select id="weekStartSelect">
          <option value="monday">Week starts Monday</option>
          <option value="sunday">Week starts Sunday</option>
        </select>

        <button id="prevBtn">←</button>
        <button id="todayBtn">Today</button>
        <button id="nextBtn">→</button>
      </div>
    </div>

    <div class="legend" id="legend"></div>
    <div class="view" id="view"></div>
  </div>

  <script>
    const config = {
      theme: "light-clean",
      defaultLayout: "month",
      weekStartsOn: "monday",
      calendars: {
        family:   { label: "Family",   color: "#10b981", icon: "🏠" },
        work:     { label: "Work",     color: "#3b82f6", icon: "💼" },
        birthdays:{ label: "Birthdays",color: "#f59e0b", icon: "🎂" },
        holidays: { label: "Holidays", color: "#ef4444", icon: "🎉" },
        school:   { label: "School",   color: "#8b5cf6", icon: "🎓" }
      }
    };

    const mockEvents = [
      { id:1, calendar:"family", title:"School run", start:"2026-04-13T08:30:00", end:"2026-04-13T09:00:00", allDay:false },
      { id:2, calendar:"work", title:"Leadership meeting", start:"2026-04-13T10:00:00", end:"2026-04-13T11:00:00", allDay:false },
      { id:3, calendar:"birthdays", title:"Quinn birthday", start:"2026-04-14", end:"2026-04-14", allDay:true, birthday:true },
      { id:4, calendar:"holidays", title:"Good Friday", start:"2026-04-17", end:"2026-04-17", allDay:true, holiday:true },
      { id:5, calendar:"family", title:"Family dinner", start:"2026-04-15T18:00:00", end:"2026-04-15T20:00:00", allDay:false },
      { id:6, calendar:"school", title:"Parents evening", start:"2026-04-16T16:30:00", end:"2026-04-16T18:30:00", allDay:false },
      { id:7, calendar:"work", title:"Quarterly review", start:"2026-04-21T09:00:00", end:"2026-04-21T10:30:00", allDay:false },
      { id:8, calendar:"family", title:"Paris trip countdown starts", start:"2026-04-24", end:"2026-04-24", allDay:true },
      { id:9, calendar:"birthdays", title:"Mum birthday", start:"2026-04-25", end:"2026-04-25", allDay:true, birthday:true },
      { id:10, calendar:"holidays", title:"Bank Holiday", start:"2026-05-04", end:"2026-05-04", allDay:true, holiday:true },
      { id:11, calendar:"school", title:"School trip", start:"2026-04-28T08:00:00", end:"2026-04-28T15:30:00", allDay:false },
      { id:12, calendar:"family", title:"Beamish day out with the whole family and an intentionally long title to stress test the layout", start:"2026-05-02T10:00:00", end:"2026-05-02T17:00:00", allDay:false }
    ];

    const state = {
      layout: config.defaultLayout,
      weekStartsOn: config.weekStartsOn,
      currentDate: new Date("2026-04-13T09:00:00")
    };

    const viewEl = document.getElementById("view");
    const legendEl = document.getElementById("legend");
    const rangeLabelEl = document.getElementById("rangeLabel");
    const layoutSelectEl = document.getElementById("layoutSelect");
    const weekStartSelectEl = document.getElementById("weekStartSelect");
    const prevBtnEl = document.getElementById("prevBtn");
    const nextBtnEl = document.getElementById("nextBtn");
    const todayBtnEl = document.getElementById("todayBtn");

    function parseEventDate(value, allDay=false){
      if (allDay) return new Date(value + "T00:00:00");
      return new Date(value);
    }

    function formatDate(date, options){
      return new Intl.DateTimeFormat("en-GB", options).format(date);
    }

    function sameDay(a, b){
      return a.getFullYear() === b.getFullYear()
        && a.getMonth() === b.getMonth()
        && a.getDate() === b.getDate();
    }

    function startOfWeek(date, startsOn){
      const d = new Date(date);
      const day = d.getDay();
      const diff = startsOn === "monday"
        ? (day === 0 ? -6 : 1 - day)
        : -day;
      d.setDate(d.getDate() + diff);
      d.setHours(0,0,0,0);
      return d;
    }

    function addDays(date, days){
      const d = new Date(date);
      d.setDate(d.getDate() + days);
      return d;
    }

    function addMonths(date, months){
      const d = new Date(date);
      d.setMonth(d.getMonth() + months);
      return d;
    }

    function startOfMonth(date){
      return new Date(date.getFullYear(), date.getMonth(), 1);
    }

    function endOfMonth(date){
      return new Date(date.getFullYear(), date.getMonth() + 1, 0);
    }

    function eventStart(event){
      return parseEventDate(event.start, !!event.allDay);
    }

    function eventEnd(event){
      return parseEventDate(event.end, !!event.allDay);
    }

    function eventsForDay(date){
      return mockEvents.filter(event => sameDay(eventStart(event), date));
    }

    function sortEvents(events){
      return [...events].sort((a,b) => eventStart(a) - eventStart(b));
    }

    function renderLegend(){
      legendEl.innerHTML = "";
      Object.entries(config.calendars).forEach(([key, meta]) => {
        const item = document.createElement("div");
        item.className = "legend-item";
        item.innerHTML = `
          <span>${meta.icon}</span>
          <span class="dot" style="background:${meta.color}"></span>
          <span>${meta.label}</span>
        `;
        legendEl.appendChild(item);
      });
    }

    function eventChip(event, compact=false){
      const meta = config.calendars[event.calendar];
      const start = eventStart(event);
      const timeText = event.allDay ? "All day" : formatDate(start, { hour:"2-digit", minute:"2-digit" });
      return `
        <div class="event-chip ${compact ? "compact" : ""}">
          <span class="event-icon">${meta.icon}</span>
          <span class="event-badge" style="background:${meta.color}"></span>
          <div>
            <div class="event-chip-title">${event.title}</div>
            <div class="event-chip-meta">${meta.label} • ${timeText}</div>
          </div>
        </div>
      `;
    }

    function renderMonth(){
      const monthStart = startOfMonth(state.currentDate);
      const gridStart = startOfWeek(monthStart, state.weekStartsOn);
      const dayNames = state.weekStartsOn === "monday"
        ? ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"]
        : ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

      rangeLabelEl.textContent = formatDate(monthStart, { month:"long", year:"numeric" });

      let html = `<div class="month-grid">`;
      dayNames.forEach(name => {
        html += `<div class="weekday">${name}</div>`;
      });

      for (let i = 0; i < 42; i++){
        const date = addDays(gridStart, i);
        const isOtherMonth = date.getMonth() !== monthStart.getMonth();
        const isToday = sameDay(date, new Date());
        const events = sortEvents(eventsForDay(date));
        const compact = window.innerWidth < 900;
        const visible = window.innerWidth < 600 ? 1 : (compact ? 2 : 3);
        const extra = Math.max(0, events.length - visible);

        html += `
          <div class="day ${isOtherMonth ? "other-month" : ""} ${isToday ? "today" : ""}">
            <div class="day-head">
              <div class="day-number">${date.getDate()}</div>
            </div>
            <div class="day-events">
              ${events.slice(0, visible).map(e => eventChip(e, compact)).join("")}
              ${extra ? `<div class="more-count">+${extra} more</div>` : ""}
            </div>
          </div>
        `;
      }

      html += `</div>`;
      viewEl.innerHTML = html;
    }

    function renderWeek(){
      const weekStart = startOfWeek(state.currentDate, state.weekStartsOn);
      const weekEnd = addDays(weekStart, 6);

      rangeLabelEl.textContent =
        `${formatDate(weekStart, { day:"numeric", month:"short" })} – ${formatDate(weekEnd, { day:"numeric", month:"short", year:"numeric" })}`;

      let html = `<div class="list-view">`;

      for (let i = 0; i < 7; i++){
        const date = addDays(weekStart, i);
        const events = sortEvents(eventsForDay(date));

        html += `
          <div class="list-day">
            <div class="list-day-header">
              <div class="list-day-title">${formatDate(date, { weekday:"long", day:"numeric", month:"long" })}</div>
              <div class="subtitle">${events.length} event${events.length === 1 ? "" : "s"}</div>
            </div>
            <div class="list-events">
              ${events.length ? events.map(event => {
                const meta = config.calendars[event.calendar];
                const timeText = event.allDay
                  ? "All day"
                  : `${formatDate(eventStart(event), { hour:"2-digit", minute:"2-digit" })} – ${formatDate(eventEnd(event), { hour:"2-digit", minute:"2-digit" })}`;
                return `
                  <div class="list-event">
                    <div class="time-col">${timeText}</div>
                    <div class="event-badge" style="background:${meta.color}"></div>
                    <div class="event-main">
                      <div class="event-title">${meta.icon} ${event.title}</div>
                      <div class="event-sub">${meta.label}</div>
                    </div>
                  </div>
                `;
              }).join("") : `<div class="list-event"><div class="event-sub">No events</div></div>`}
            </div>
          </div>
        `;
      }

      html += `</div>`;
      viewEl.innerHTML = html;
    }

    function renderAgenda(){
      const start = new Date(state.currentDate);
      start.setHours(0,0,0,0);
      const days = 14;

      rangeLabelEl.textContent = `Next ${days} days`;

      let html = `<div class="list-view">`;

      for (let i = 0; i < days; i++){
        const date = addDays(start, i);
        const events = sortEvents(eventsForDay(date));
        if (!events.length) continue;

        html += `
          <div class="list-day">
            <div class="list-day-header">
              <div class="list-day-title">${formatDate(date, { weekday:"long", day:"numeric", month:"long" })}</div>
              <div class="subtitle">${events.length} event${events.length === 1 ? "" : "s"}</div>
            </div>
            <div class="list-events">
              ${events.map(event => {
                const meta = config.calendars[event.calendar];
                const timeText = event.allDay
                  ? "All day"
                  : `${formatDate(eventStart(event), { hour:"2-digit", minute:"2-digit" })}`;
                return `
                  <div class="list-event">
                    <div class="time-col">${timeText}</div>
                    <div class="event-badge" style="background:${meta.color}"></div>
                    <div class="event-main">
                      <div class="event-title">${meta.icon} ${event.title}</div>
                      <div class="event-sub">${meta.label}</div>
                    </div>
                  </div>
                `;
              }).join("")}
            </div>
          </div>
        `;
      }

      html += `</div>`;
      viewEl.innerHTML = html;
    }

    function renderBirthdays(){
      const birthdays = sortEvents(mockEvents.filter(e => e.birthday));
      rangeLabelEl.textContent = `Birthday view`;

      viewEl.innerHTML = `
        <div class="birthday-grid">
          ${birthdays.map(event => {
            const date = eventStart(event);
            return `
              <div class="birthday-card">
                <div class="birthday-icon">🎂</div>
                <div>
                  <div class="birthday-name">${event.title}</div>
                  <div class="birthday-date">${formatDate(date, { weekday:"long", day:"numeric", month:"long", year:"numeric" })}</div>
                </div>
              </div>
            `;
          }).join("")}
        </div>
      `;
    }

    function renderNextUp(){
      const now = new Date(state.currentDate);
      const upcoming = sortEvents(mockEvents.filter(e => eventStart(e) >= now));
      const next = upcoming[0];

      rangeLabelEl.textContent = `What’s next`;

      if (!next){
        viewEl.innerHTML = `<div class="hero"><div class="hero-title">No upcoming events</div></div>`;
        return;
      }

      const meta = config.calendars[next.calendar];
      const nextDate = eventStart(next);

      viewEl.innerHTML = `
        <div class="next-up">
          <div class="hero">
            <div class="hero-label">Next event</div>
            <div class="hero-title">${meta.icon} ${next.title}</div>
            <div class="hero-meta">
              ${meta.label} • ${next.allDay ? "All day" : formatDate(nextDate, { weekday:"long", day:"numeric", month:"long", hour:"2-digit", minute:"2-digit" })}
            </div>
          </div>

          <div class="mini-list">
            ${upcoming.slice(1, 6).map(event => {
              const eMeta = config.calendars[event.calendar];
              const d = eventStart(event);
              return `
                <div class="list-event" style="border:1px solid var(--border); border-radius:14px; background:var(--panel);">
                  <div class="time-col">${event.allDay ? "All day" : formatDate(d, { day:"numeric", month:"short", hour:"2-digit", minute:"2-digit" })}</div>
                  <div class="event-badge" style="background:${eMeta.color}"></div>
                  <div class="event-main">
                    <div class="event-title">${eMeta.icon} ${event.title}</div>
                    <div class="event-sub">${eMeta.label}</div>
                  </div>
                </div>
              `;
            }).join("")}
          </div>
        </div>
      `;
    }

    function render(){
      renderLegend();

      if (state.layout === "month") renderMonth();
      else if (state.layout === "week") renderWeek();
      else if (state.layout === "agenda") renderAgenda();
      else if (state.layout === "birthdays") renderBirthdays();
      else if (state.layout === "nextup") renderNextUp();
    }

    layoutSelectEl.value = state.layout;
    weekStartSelectEl.value = state.weekStartsOn;

    layoutSelectEl.addEventListener("change", e => {
      state.layout = e.target.value;
      render();
    });

    weekStartSelectEl.addEventListener("change", e => {
      state.weekStartsOn = e.target.value;
      render();
    });

    prevBtnEl.addEventListener("click", () => {
      if (state.layout === "month") state.currentDate = addMonths(state.currentDate, -1);
      else if (state.layout === "week") state.currentDate = addDays(state.currentDate, -7);
      else state.currentDate = addDays(state.currentDate, -14);
      render();
    });

    nextBtnEl.addEventListener("click", () => {
      if (state.layout === "month") state.currentDate = addMonths(state.currentDate, 1);
      else if (state.layout === "week") state.currentDate = addDays(state.currentDate, 7);
      else state.currentDate = addDays(state.currentDate, 14);
      render();
    });

    todayBtnEl.addEventListener("click", () => {
      state.currentDate = new Date();
      render();
    });

    render();
  </script>
</body>
</html>
